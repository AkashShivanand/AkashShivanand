<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="Akash Kumar, product designer who builds. On the left, a designed amount field with an error state. On the right, the same component as React code. Designs it, then ships it. Keep it simple.">
  <style>
    /* structure stays visible; only the code types in, so the banner never renders blank */
    .l { animation: type .4s cubic-bezier(.23,1,.32,1) both; }
    @keyframes type { from { opacity: 0; transform: translateX(-7px); } to { opacity: 1; transform: none; } }
    @media (prefers-reduced-motion: reduce) { .l { animation: none; opacity: 1; transform: none; } }
  </style>
  <!-- rounded card: seamless on GitHub dark, a deliberate dark card on GitHub light. Balanced 24px padding, content sits on the same left rail as the body copy. -->
  <rect width="1200" height="300" rx="18" fill="#0D1117"/>

  <text x="24" y="36" fill="#6E7681" font-size="12" letter-spacing="3" font-weight="600">DESIGN</text>
  <text x="1176" y="36" fill="#6E7681" font-size="12" letter-spacing="3" font-weight="600" text-anchor="end">CODE</text>

  <!-- LEFT: designed component in its error state -->
  <rect x="24" y="56" width="514" height="152" rx="12" fill="#161B22" stroke="#30363D"/>
  <text x="48" y="90" fill="#8B949E" font-size="14">Amount</text>
  <rect x="48" y="102" width="356" height="42" rx="8" fill="#0D1117" stroke="#F85149" stroke-width="1.5"/>
  <text x="64" y="129" fill="#6E7681" font-size="16" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">&#8377;</text>
  <rect x="84" y="113" width="2" height="21" fill="#58A6FF">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" calcMode="discrete" repeatCount="indefinite"/>
  </rect>
  <rect x="424" y="102" width="90" height="42" rx="8" fill="#58A6FF"/>
  <text x="469" y="129" fill="#0D1117" font-size="15" font-weight="600" text-anchor="middle">Pay</text>
  <path d="M48 176 L54 164 L60 176 Z" fill="#F85149"/>
  <rect x="53" y="168" width="2" height="4" fill="#0D1117"/>
  <text x="68" y="176" fill="#F85149" font-size="13">Enter an amount</text>

  <!-- seam: design becomes code -->
  <line x1="566" y1="62" x2="566" y2="202" stroke="#21262D"/>
  <circle cx="566" cy="132" r="15" fill="#0D1117" stroke="#30363D"/>
  <text x="566" y="137" fill="#58A6FF" font-size="14" text-anchor="middle" font-family="ui-monospace, monospace">&#8594;</text>

  <!-- RIGHT: editor shell + line numbers -->
  <rect x="594" y="56" width="582" height="152" rx="12" fill="#0D1117" stroke="#21262D"/>
  <line x1="628" y1="62" x2="628" y2="202" stroke="#21262D"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14.5" fill="#484F58" text-anchor="end">
    <text x="622" y="83">1</text>
    <text x="622" y="102">2</text>
    <text x="622" y="121">3</text>
    <text x="622" y="140">4</text>
    <text x="622" y="159">5</text>
    <text x="622" y="178">6</text>
    <text x="622" y="197">7</text>
  </g>

  <!-- RIGHT: the same component as code, typed in line by line -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14.5" xml:space="preserve">
    <text class="l" style="animation-delay:.34s" x="644" y="83"><tspan fill="#C9D1D9">&lt;</tspan><tspan fill="#7EE787">Field</tspan></text>
    <text class="l" style="animation-delay:.4s"  x="662" y="102"><tspan fill="#79C0FF">label</tspan><tspan fill="#C9D1D9">=</tspan><tspan fill="#A5D6FF">"Amount"</tspan></text>
    <text class="l" style="animation-delay:.46s" x="662" y="121"><tspan fill="#79C0FF">prefix</tspan><tspan fill="#C9D1D9">=</tspan><tspan fill="#A5D6FF">"&#8377;"</tspan></text>
    <text class="l" style="animation-delay:.52s" x="662" y="140"><tspan fill="#79C0FF">error</tspan><tspan fill="#C9D1D9">=</tspan><tspan fill="#A5D6FF">"Enter an amount"</tspan></text>
    <text class="l" style="animation-delay:.58s" x="644" y="159"><tspan fill="#C9D1D9">&gt;</tspan></text>
    <text class="l" style="animation-delay:.64s" x="662" y="178"><tspan fill="#C9D1D9">&lt;</tspan><tspan fill="#7EE787">Button</tspan><tspan fill="#C9D1D9">&gt;Pay&lt;/</tspan><tspan fill="#7EE787">Button</tspan><tspan fill="#C9D1D9">&gt;</tspan></text>
    <text class="l" style="animation-delay:.7s"  x="644" y="197"><tspan fill="#C9D1D9">&lt;/</tspan><tspan fill="#7EE787">Field</tspan><tspan fill="#C9D1D9">&gt;</tspan></text>
  </g>

  <!-- footer: identity + positioning + mark, on the same rail as the content -->
  <line x1="24" y1="236" x2="1176" y2="236" stroke="#21262D"/>
  <text x="24" y="266" font-size="15"><tspan fill="#E6EDF3" font-weight="700" letter-spacing="1.5">AKASH KUMAR</tspan><tspan fill="#6E7681">&#160;&#160;&#160;·&#160;&#160;&#160;</tspan><tspan fill="#8B949E" font-size="14">product designer who builds</tspan></text>
  <text x="1176" y="266" font-size="17" font-weight="700" text-anchor="end"><tspan fill="#6E7681">#</tspan><tspan fill="#58A6FF">keep</tspan><tspan fill="#C9D1D9">it</tspan><tspan fill="#58A6FF">simple</tspan></text>
</svg>
