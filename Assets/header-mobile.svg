<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 540" width="720" height="540" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="A designed mobile number field caught in its error state, and the same component written as React code below it. Labelled DESIGN and CODE. Keep it simple.">
  <style>
    /* structure stays visible; only the code types in, so the banner never renders blank */
    .l { animation: type .4s cubic-bezier(.23,1,.32,1) both; }
    @keyframes type { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: none; } }
    @media (prefers-reduced-motion: reduce) { .l { animation: none; opacity: 1; transform: none; } }
  </style>
  <!-- rounded bordered card -->
  <rect x="1" y="1" width="718" height="538" rx="21" fill="#0D1117" stroke="#21262D"/>

  <!-- mark only. No name, tagline, or bio-paraphrasing caption (see CLAUDE.md). -->
  <text x="28" y="46" font-size="22" font-weight="700"><tspan fill="#6E7681">#</tspan><tspan fill="#58A6FF">keep</tspan><tspan fill="#C9D1D9">it</tspan><tspan fill="#58A6FF">simple</tspan></text>
  <line x1="28" y1="72" x2="692" y2="72" stroke="#21262D"/>

  <!-- DESIGN / CODE lead the hierarchy; the demo component is deliberately non-transactional. -->
  <text x="28" y="106" fill="#8B949E" font-size="13" letter-spacing="3" font-weight="600">DESIGN</text>
  <rect x="28" y="120" width="664" height="150" rx="14" fill="#161B22" stroke="#30363D"/>
  <text x="56" y="158" fill="#8B949E" font-size="16">Mobile number</text>
  <rect x="56" y="170" width="428" height="46" rx="10" fill="#0D1117" stroke="#F85149" stroke-width="1.5"/>
  <text x="76" y="200" fill="#6E7681" font-size="19" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">+91</text>
  <rect x="114" y="180" width="2" height="24" fill="#58A6FF">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" calcMode="discrete" repeatCount="indefinite"/>
  </rect>
  <rect x="504" y="170" width="160" height="46" rx="10" fill="#58A6FF"/>
  <text x="584" y="200" fill="#0D1117" font-size="17" font-weight="600" text-anchor="middle">Continue</text>
  <path d="M56 260 L62 247 L68 260 Z" fill="#F85149"/>
  <rect x="61" y="251" width="2" height="5" fill="#0D1117"/>
  <text x="78" y="260" fill="#F85149" font-size="14">Enter all 10 digits</text>

  <!-- seam: becomes -->
  <line x1="360" y1="278" x2="360" y2="314" stroke="#21262D"/>
  <circle cx="360" cy="296" r="16" fill="#0D1117" stroke="#30363D"/>
  <text x="360" y="302" fill="#58A6FF" font-size="16" text-anchor="middle" font-family="ui-monospace, monospace">&#8595;</text>

  <!-- CODE -->
  <text x="28" y="348" fill="#8B949E" font-size="13" letter-spacing="3" font-weight="600">CODE</text>
  <rect x="28" y="362" width="664" height="150" rx="14" fill="#0D1117" stroke="#21262D"/>
  <line x1="68" y1="376" x2="68" y2="498" stroke="#21262D"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#484F58" text-anchor="end">
    <text x="58" y="390">1</text>
    <text x="58" y="409">2</text>
    <text x="58" y="428">3</text>
    <text x="58" y="447">4</text>
    <text x="58" y="466">5</text>
    <text x="58" y="485">6</text>
    <text x="58" y="504">7</text>
  </g>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">
    <text class="l" style="animation-delay:.34s" x="84" y="390"><tspan fill="#C9D1D9">&lt;</tspan><tspan fill="#7EE787">Field</tspan></text>
    <text class="l" style="animation-delay:.4s"  x="102" y="409"><tspan fill="#79C0FF">label</tspan><tspan fill="#C9D1D9">=</tspan><tspan fill="#A5D6FF">"Mobile number"</tspan></text>
    <text class="l" style="animation-delay:.46s" x="102" y="428"><tspan fill="#79C0FF">prefix</tspan><tspan fill="#C9D1D9">=</tspan><tspan fill="#A5D6FF">"+91"</tspan></text>
    <text class="l" style="animation-delay:.52s" x="102" y="447"><tspan fill="#79C0FF">error</tspan><tspan fill="#C9D1D9">=</tspan><tspan fill="#A5D6FF">"Enter all 10 digits"</tspan></text>
    <text class="l" style="animation-delay:.58s" x="84" y="466"><tspan fill="#C9D1D9">&gt;</tspan></text>
    <text class="l" style="animation-delay:.64s" x="102" y="485"><tspan fill="#C9D1D9">&lt;</tspan><tspan fill="#7EE787">Button</tspan><tspan fill="#C9D1D9">&gt;Continue&lt;/</tspan><tspan fill="#7EE787">Button</tspan><tspan fill="#C9D1D9">&gt;</tspan></text>
    <text class="l" style="animation-delay:.7s"  x="84" y="504"><tspan fill="#C9D1D9">&lt;/</tspan><tspan fill="#7EE787">Field</tspan><tspan fill="#C9D1D9">&gt;</tspan></text>
  </g>
</svg>
