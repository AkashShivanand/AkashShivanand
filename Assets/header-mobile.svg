<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 660" width="720" height="660" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="Akash Kumar, product designer who builds. A designed amount field with an error state becomes React code: designs it, then ships it. Keep it simple.">
  <style>
    /* structure stays visible; only the code types in, so the banner never renders blank */
    .l { animation: type .4s cubic-bezier(.23,1,.32,1) both; }
    @keyframes type { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: none; } }
    @media (prefers-reduced-motion: reduce) {
      .l { animation: none; opacity: 1; transform: none; }
    }
  </style>
  <rect width="720" height="660" fill="#0D1117"/>

  <!-- identity -->
  <g class="s" style="animation-delay:.04s">
    <text x="40" y="58" font-size="24" font-weight="700" letter-spacing="2" fill="#E6EDF3">AKASH KUMAR</text>
    <text x="680" y="58" font-size="21" font-weight="700" text-anchor="end"><tspan fill="#6E7681">#</tspan><tspan fill="#58A6FF">keep</tspan><tspan fill="#C9D1D9">it</tspan><tspan fill="#58A6FF">simple</tspan></text>
    <text x="40" y="90" font-size="16" fill="#8B949E">product designer who builds</text>
    <line x1="40" y1="112" x2="680" y2="112" stroke="#21262D"/>
  </g>

  <!-- DESIGN -->
  <g class="s" style="animation-delay:.12s">
    <text x="40" y="152" fill="#6E7681" font-size="13" letter-spacing="3" font-weight="600">DESIGN</text>
    <rect x="40" y="168" width="640" height="180" rx="14" fill="#161B22" stroke="#30363D"/>
    <text x="72" y="212" fill="#8B949E" font-size="16">Amount</text>
    <rect x="72" y="226" width="368" height="50" rx="10" fill="#0D1117" stroke="#F85149" stroke-width="1.5"/>
    <text x="92" y="258" fill="#6E7681" font-size="19" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">&#8377;</text>
    <rect x="116" y="238" width="2" height="26" fill="#58A6FF">
      <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" calcMode="discrete" repeatCount="indefinite"/>
    </rect>
    <rect x="460" y="226" width="180" height="50" rx="10" fill="#58A6FF"/>
    <text x="550" y="258" fill="#0D1117" font-size="17" font-weight="600" text-anchor="middle">Pay</text>
    <path d="M72 314 L79 300 L86 314 Z" fill="#F85149"/>
    <rect x="78" y="305" width="2" height="5" fill="#0D1117"/>
    <text x="96" y="314" fill="#F85149" font-size="15">Enter an amount</text>
  </g>

  <!-- seam: becomes -->
  <g class="s" style="animation-delay:.22s">
    <line x1="360" y1="356" x2="360" y2="404" stroke="#21262D"/>
    <circle cx="360" cy="380" r="17" fill="#0D1117" stroke="#30363D"/>
    <text x="360" y="386" fill="#58A6FF" font-size="16" text-anchor="middle" font-family="ui-monospace, monospace">&#8595;</text>
  </g>

  <!-- CODE -->
  <g class="s" style="animation-delay:.28s">
    <text x="40" y="446" fill="#6E7681" font-size="13" letter-spacing="3" font-weight="600">CODE</text>
    <rect x="40" y="462" width="640" height="176" rx="14" fill="#0D1117" stroke="#21262D"/>
    <line x1="82" y1="476" x2="82" y2="624" stroke="#21262D"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" fill="#484F58" text-anchor="end">
      <text x="72" y="500">1</text>
      <text x="72" y="521">2</text>
      <text x="72" y="542">3</text>
      <text x="72" y="563">4</text>
      <text x="72" y="584">5</text>
      <text x="72" y="605">6</text>
      <text x="72" y="626">7</text>
    </g>
  </g>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" xml:space="preserve">
    <text class="l" style="animation-delay:.34s" x="98" y="500"><tspan fill="#C9D1D9">&lt;</tspan><tspan fill="#7EE787">Field</tspan></text>
    <text class="l" style="animation-delay:.4s"  x="118" y="521"><tspan fill="#79C0FF">label</tspan><tspan fill="#C9D1D9">=</tspan><tspan fill="#A5D6FF">"Amount"</tspan></text>
    <text class="l" style="animation-delay:.46s" x="118" y="542"><tspan fill="#79C0FF">prefix</tspan><tspan fill="#C9D1D9">=</tspan><tspan fill="#A5D6FF">"&#8377;"</tspan></text>
    <text class="l" style="animation-delay:.52s" x="118" y="563"><tspan fill="#79C0FF">error</tspan><tspan fill="#C9D1D9">=</tspan><tspan fill="#A5D6FF">"Enter an amount"</tspan></text>
    <text class="l" style="animation-delay:.58s" x="98" y="584"><tspan fill="#C9D1D9">&gt;</tspan></text>
    <text class="l" style="animation-delay:.64s" x="118" y="605"><tspan fill="#C9D1D9">&lt;</tspan><tspan fill="#7EE787">Button</tspan><tspan fill="#C9D1D9">&gt;Pay&lt;/</tspan><tspan fill="#7EE787">Button</tspan><tspan fill="#C9D1D9">&gt;</tspan></text>
    <text class="l" style="animation-delay:.7s"  x="98" y="626"><tspan fill="#C9D1D9">&lt;/</tspan><tspan fill="#7EE787">Field</tspan><tspan fill="#C9D1D9">&gt;</tspan></text>
  </g>
</svg>
